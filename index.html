    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Feelio — Draw your mood</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#080810; color:#fff;
            font-family: -apple-system, sans-serif;
            height:100vh; height:100dvh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            overflow:hidden; transition: background 1.2s;
        }
        .langs { position:fixed; top:16px; right:16px; z-index:20; display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; max-width:200px; }
        .langs span {
            color:#555; font-size:0.6rem; cursor:pointer;
            padding:5px 8px; border-radius:10px;
        }
        .langs span.active { color:#aaa; background:rgba(255,255,255,0.06); }
        .logo { font-size:1.8rem; font-weight:200; letter-spacing:5px; margin-bottom:4px; }
        .tagline { color:#555; font-size:0.75rem; margin-bottom:16px; }
        canvas {
            border:1px solid rgba(255,255,255,0.1); border-radius:24px;
            background:rgba(10,10,30,0.6); touch-action:none;
            width:280px; height:280px;
        }
        #result { font-size:3.8rem; min-height:65px; margin-top:14px; }
        #phrase { color:#999; font-size:0.85rem; margin-top:6px; text-align:center; max-width:320px; }
        #phrase2 { color:#666; font-size:0.72rem; margin-top:3px; text-align:center; max-width:320px; }
        button {
            margin-top:12px; padding:12px 32px;
            background:rgba(255,255,255,0.04); color:#777;
            border:1px solid rgba(255,255,255,0.08); border-radius:50px;
            font-size:0.8rem; cursor:pointer;
        }
        #counter { margin-top:18px; color:#333; font-size:0.65rem; }
        .hint { color:#444; font-size:0.7rem; margin-top:8px; }
    </style>
</head>
<body>

<div class="langs">
    <span onclick="setLang('en')" class="active" id="lang-en">EN</span>
    <span onclick="setLang('fr')" id="lang-fr">FR</span>
    <span onclick="setLang('es')" id="lang-es">ES</span>
    <span onclick="setLang('ar')" id="lang-ar">AR</span>
    <span onclick="setLang('ja')" id="lang-ja">JA</span>
    <span onclick="setLang('zh')" id="lang-zh">中</span>
    <span onclick="setLang('tam')" id="lang-tam">ⵜ</span>
</div>

<div class="logo" id="logo">☁️ Feelio</div>
<div class="tagline" id="tagline">Draw your mood</div>

<canvas id="canvas" width="560" height="560"></canvas>

<div id="result"></div>
<div id="phrase"></div>
<div id="phrase2"></div>
<button onclick="resetCanvas()" id="btnReset">Clear</button>
<div id="counter"></div>
<div class="hint" id="hint">Use your finger to draw</div>

let lang = 'en';
let T = texts[lang];

function setLang(l) {
    lang = l; T = texts[l];
    document.querySelectorAll('.langs span').forEach(s => s.classList.remove('active'));
    document.getElementById('lang-'+l).classList.add('active');
    document.getElementById('logo').textContent = T.logo;
    document.getElementById('tagline').textContent = T.tagline;
    document.getElementById('btnReset').textContent = T.reset;
    document.getElementById('hint').textContent = T.hint;
    resetCanvas();
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false, points = [], startTime = 0;

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault(); drawing = true; points = []; startTime = Date.now();
    document.getElementById('hint').style.display = 'none';
    const p = getPos(e); points.push({x:p.x, y:p.y, time:Date.now()});
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault(); if(!drawing) return;
    const p = getPos(e); points.push({x:p.x, y:p.y, time:Date.now()});
    ctx.lineTo(p.x, p.y); ctx.strokeStyle = 'rgba(200,210,255,0.9)'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
});
canvas.addEventListener('touchend', () => { drawing = false; analyzeDrawing(); });

canvas.addEventListener('mousedown', (e) => {
    drawing = true; points = []; startTime = Date.now();
    document.getElementById('hint').style.display = 'none';
    const p = getPos(e); points.push({x:p.x, y:p.y, time:Date.now()});
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('mousemove', (e) => {
    if(!drawing) return;
    const p = getPos(e); points.push({x:p.x, y:p.y, time:Date.now()});
    ctx.lineTo(p.x, p.y); ctx.strokeStyle = 'rgba(200,210,255,0.9)'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
});
canvas.addEventListener('mouseup', () => { drawing = false; analyzeDrawing(); });

function analyzeDrawing() {
    if(points.length < 5) return;
    const endTime = Date.now();
    const duration = (endTime - startTime) / 1000;
    let totalDistance = 0;
    for(let i=1; i<points.length; i++) {
        const dx = points[i].x - points[i-1].x;
        const dy = points[i].y - points[i-1].y;
        totalDistance += Math.sqrt(dx*dx+dy*dy);
    }
    const speed = totalDistance / duration;
    let sumX=0, sumY=0;
    points.forEach(p => { sumX+=p.x; sumY+=p.y; });
    const cx=sumX/points.length, cy=sumY/points.length;
    let dispersion=0;
    points.forEach(p => { dispersion += Math.sqrt((p.x-cx)**2+(p.y-cy)**2); });
    dispersion /= points.length;
    
    let emoji, p1, p2;
    if(speed > 5 && dispersion > 80) { emoji=T.tornado; p1=T.t1; p2=T.t2; document.body.style.background='#0f0a18'; }
    else if(speed > 3) { emoji=T.lightning; p1=T.l1; p2=T.l2; document.body.style.background='#0a0a1f'; }
    else if(dispersion < 40) { emoji=T.rain; p1=T.r1; p2=T.r2; document.body.style.background='#080f18'; }
    else if(speed < 1.5) { emoji=T.sun; p1=T.s1; p2=T.s2; document.body.style.background='#0f0f08'; }
    else if(totalDistance < 100) { emoji=T.night; p1=T.n1; p2=T.n2; document.body.style.background='#060610'; }
    else { emoji=T.rainbow; p1=T.rb1; p2=T.rb2; document.body.style.background='#0a0a12'; }
    
    document.getElementById('result').textContent = emoji;
    document.getElementById('phrase').textContent = p1;
    document.getElementById('phrase2').textContent = p2;
    updateCounter();
}

function resetCanvas() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    document.getElementById('result').textContent = '';
    document.getElementById('phrase').textContent = '';
    document.getElementById('phrase2').textContent = '';
    document.body.style.background = '#080810';
    points = [];
    document.getElementById('hint').style.display = 'block';
}

function updateCounter() {
    let count = parseInt(localStorage.getItem('feelio_count') || '0');
    count++;
    localStorage.setItem('feelio_count', count);
    document.getElementById('counter').textContent = count.toLocaleString() + ' ' + T.counter;
}

let savedCount = parseInt(localStorage.getItem('feelio_count') || '0');
document.getElementById('counter').textContent = savedCount.toLocaleString() + ' ' + T.counter;
</script>
