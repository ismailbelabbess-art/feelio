<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>The Mirror — Send your message</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter',-apple-system,sans-serif;
    background:#000;color:#fff;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;
    padding:20px;
}
.container{max-width:450px;width:100%;text-align:center}
h1{font-size:2rem;font-weight:200;letter-spacing:4px;margin-bottom:4px}
.subtitle{color:rgba(255,255,255,0.4);font-size:0.8rem;margin-bottom:20px}
.form-group{margin-bottom:15px;text-align:left}
label{display:block;font-size:0.7rem;color:rgba(255,255,255,0.5);margin-bottom:4px}
select,textarea{
    width:100%;padding:12px;border-radius:12px;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.05);color:#fff;
    font-family:'Inter',sans-serif;font-size:0.85rem;
}
textarea{height:120px;resize:none}
select{appearance:none}
.radio-group{display:flex;gap:15px}
.radio-group label{display:flex;align-items:center;gap:6px;color:#fff;font-size:0.8rem}
.btn{
    width:100%;padding:14px;border-radius:50px;border:none;
    background:linear-gradient(135deg,#3b82f6,#ec4899);color:#fff;
    font-size:0.9rem;font-weight:500;cursor:pointer;letter-spacing:0.5px;
    transition:all 0.2s ease;
}
.btn:active{transform:scale(0.96)}
.note{color:rgba(255,255,255,0.3);font-size:0.6rem;margin-top:12px}
.success{display:none;color:#34d399;font-size:0.9rem;margin-top:15px}
</style>
</head>
<body>
<div class="container">
    <h1>THE MIRROR</h1>
    <div class="subtitle">Anonymous message. Read tomorrow.</div>
    
    <div id="formArea">
        <div class="form-group">
            <label>Theme</label>
            <select id="theme">
                <option value="first-move">Why I don't make the first move</option>
                <option value="unspoken">What I don't say to my partner</option>
                <option value="stay">Why I stay in a relationship</option>
                <option value="fear">What scares me about the other gender</option>
                <option value="regret">What I regret saying</option>
                <option value="understand">What I wish you understood</option>
                <option value="alone">Why I prefer being alone</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Your message (anonymous)</label>
            <textarea id="message" placeholder="Write what you never dared to say..." maxlength="500"></textarea>
        </div>
        
        <div class="form-group">
            <label>Your voice</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male" checked> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>
        </div>
        
        <button class="btn" onclick="submitMessage()">Send anonymously →</button>
    </div>
    
    <div class="success" id="successMsg">✓ Message sent. It may be read tomorrow.</div>
    <div class="note">No name. No email. No data stored. Just a message.</div>
</div>

<script>
function submitMessage(){
    var theme = document.getElementById('theme').value;
    var message = document.getElementById('message').value.trim();
    var gender = document.querySelector('input[name="gender"]:checked').value;
    
    if(!message) return alert('Please write a message.');
    
    // Store in localStorage (all local, no server)
    var messages = JSON.parse(localStorage.getItem('mirror_messages') || '[]');
    messages.push({
        theme: theme,
        message: message,
        gender: gender,
        date: new Date().toISOString().split('T')[0]
    });
    localStorage.setItem('mirror_messages', JSON.stringify(messages));
    
    document.getElementById('formArea').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
}
</script>
</body>
</html>
