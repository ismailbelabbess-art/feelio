<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mewonen Story</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Inter',-apple-system,sans-serif;
    background:#000;color:#fff;
    height:100dvh;display:flex;align-items:center;justify-content:center;
    overflow:hidden;text-align:center;
}
.screen{width:100%;max-width:450px;height:100%;position:relative}
.bg-img{
    position:absolute;inset:0;background-size:cover;background-position:center;
    opacity:0;transition:opacity 0.5s ease;
}
.bg-img.show{opacity:0.7}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);opacity:0;transition:opacity 0.5s ease}
.overlay.show{opacity:1}
.text-block{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:2.5rem;font-weight:800;letter-spacing:2px;text-align:center;
    width:90%;opacity:0;transition:opacity 0.3s ease;z-index:10;
    text-shadow:0 0 20px rgba(0,0,0,0.8);
}
.text-block.show{opacity:1}
.text-block.hook{font-size:2.8rem;color:#fff}
.text-block.reveal{font-size:2.3rem;color:#ef4444}
.text-block.cta{font-size:2rem;color:#a78bfa}
.text-block.url{font-size:1.5rem;color:#fff}
</style>
</head>
<body>

<div class="screen" id="screen">
    <div class="bg-img" id="bgImage"></div>
    <div class="overlay" id="overlay"></div>
    <div class="text-block hook" id="hook">I DIDN'T REPLY</div>
    <div class="text-block reveal" id="reveal">HE DIED THE NEXT DAY</div>
    <div class="text-block cta" id="cta">TELL THEM TODAY</div>
    <div class="text-block url" id="url">mewonen.com 💜</div>
</div>

<script>
var stories = [
    {hook:"I DIDN'T REPLY", reveal:"HE DIED THE NEXT DAY", cta:"TELL THEM TODAY", bg:"https://images.pexels.com/photos/3394650/pexels-photo-3394650.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"SHE SAID SHE WAS FINE", reveal:"SHE WASN'T", cta:"ASK TWICE", bg:"https://images.pexels.com/photos/670720/pexels-photo-670720.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"HE CALLED EVERY SUNDAY", reveal:"THEN ONE SUNDAY HE DIDN'T", cta:"CALL YOUR MOM", bg:"https://images.pexels.com/photos/3768142/pexels-photo-3768142.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"I SAW HER CRYING", reveal:"SHE SAID IT WAS ALLERGIES", cta:"HUG SOMEONE TODAY", bg:"https://images.pexels.com/photos/3812733/pexels-photo-3812733.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"HE WORKED EVERY DAY", reveal:"HE MISSED HER CHILDHOOD", cta:"TIME IS EVERYTHING", bg:"https://images.pexels.com/photos/2451645/pexels-photo-2451645.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"SHE POSTED A SMILE", reveal:"SHE DELETED IT AN HOUR LATER", cta:"CHECK ON YOUR FRIENDS", bg:"https://images.pexels.com/photos/4050413/pexels-photo-4050413.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"HE SAID HE'D COME BACK", reveal:"HE NEVER DID", cta:"KEEP YOUR PROMISES", bg:"https://images.pexels.com/photos/2102431/pexels-photo-2102431.jpeg?auto=compress&cs=tinysrgb&w=600"},
    {hook:"SHE WAITED BY THE DOOR", reveal:"FOR SOMEONE WHO NEVER CAME", cta:"DON'T MAKE PEOPLE WAIT", bg:"https://images.pexels.com/photos/271618/pexels-photo-271618.jpeg?auto=compress&cs=tinysrgb&w=600"}
];

var day = new Date().getDate();
var story = stories[day % stories.length];

document.getElementById('hook').textContent = story.hook;
document.getElementById('reveal').textContent = story.reveal;
document.getElementById('cta').textContent = story.cta;
document.getElementById('bgImage').style.backgroundImage = 'url(' + story.bg + ')';

var bgImage = document.getElementById('bgImage');
var overlay = document.getElementById('overlay');
var hook = document.getElementById('hook');
var reveal = document.getElementById('reveal');
var cta = document.getElementById('cta');
var url = document.getElementById('url');

function animate(){
    bgImage.classList.add('show');
    overlay.classList.add('show');
    hook.classList.add('show');
    reveal.classList.remove('show');
    cta.classList.remove('show');
    url.classList.remove('show');
    
    setTimeout(function(){
        hook.classList.remove('show');
        reveal.classList.add('show');
    }, 2000);
    
    setTimeout(function(){
        reveal.classList.remove('show');
        cta.classList.add('show');
    }, 4000);
    
    setTimeout(function(){
        cta.classList.remove('show');
        url.classList.add('show');
    }, 6000);
    
    setTimeout(function(){
        url.classList.remove('show');
        bgImage.classList.remove('show');
        overlay.classList.remove('show');
        animate();
    }, 8000);
}

animate();
</script>
</body>
</html>
